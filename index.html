<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <link rel="stylesheet" href="css/all.min.css"> 
    <!-- <link rel="stylesheet" href="./fontawesome-free-7.1.0-web/css/all.min.css"> -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2 class="title">Welcome <i class="fa-regular fa-handshake"></i></h2>
        <p class="subtitle">Login to your account to continue</p>

        <form id="loginForm" action="" novalidate>

            <!-- Email -->
            <div class="form-group" id="emailGroup">
                <label for="email">Email</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" value="" name="e-mail">
                </div>
                <small class="error-message"></small>  <!--Error Message-->
            </div>

            <!-- Password -->
            <div class="form-group" id="passwordGroup">
                <label for="password">Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" value="" name="pass">
                    
                </div>
                <small class="error-message"></small>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn">Login</button>

        </form>

        <!-- Optional Footer -->
        <p class="footer-text">Don't have an account? <a href="#">Sign Up</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
